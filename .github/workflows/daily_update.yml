name: Daily Faculty Job Update

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import U.S. News top 200 schools
        run: |
          if [ -f data/usnews_cs_top200_from_copy.json ]; then
            python scripts/import_usnews_schools.py \
              --input data/usnews_cs_top200_from_copy.json \
              --out data/schools.csv \
              --top-n 200
          else
            echo "data/usnews_cs_top200_from_copy.json not found; using existing data/schools.csv"
          fi

      - name: Enrich school URLs including CS job listing pages
        run: |
          python scripts/enrich_schools.py \
            --overwrite-schools \
            --sleep 0.5

      - name: Collect general job board openings
        run: |
          python scripts/collect_jobs.py

      - name: Collect school CS/faculty career pages
        run: |
          python scripts/collect_school_career_pages.py \
            --strict \
            --sleep 0.5

      - name: Enrich jobs
        run: |
          python scripts/enrich_jobs.py

      - name: Build GitHub Pages site
        run: |
          python scripts/build_site.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A data docs

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update CS faculty job openings"
            git push origin main
          fi
