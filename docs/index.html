back%20operator%3C%2Fp%3E%3Cp%3E%3Cstrong%3EASL%20INTERPRETERS%3C%2Fstrong%3E%3C%2Fp%3E%3Cp%3E%3Cbr%3EJessy%20Severe%20%26amp%3B%20Chelsea%20Huber%3C%2Fp%3E%3Cp%3E%3Cstrong%3EACCESSIBILITY%3C%2Fstrong%3E%3Cbr%3EThe%20Boiler%20Room%20Theatre%20is%20located%20on%20the%20ground%20floor%20of%20Lincoln%20Hall%20and%20is%20ADA%20Accessible.%20Enter%20Lincoln%20Hall%20from%20SW%20Broadway.%3C%2Fp%3E%3Cp%3EPerformed%20in%20English%20with%20English%20Supertitles.%3C%2Fp%3E%3Cp%3ESunday%2C%20June%2021st%20performance%20includes%20ASL%20interpretation.%3C%2Fp%3E%3Cp%3EMultiple%20performances%20from%20June%2018-21%2C%202026.%26nbsp%3B%3C%2Fp%3E%3Chr%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3ECaroline%20Louise%20Miller%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%E2%80%8BComposer%20%26amp%3B%20Librettist%3C%2Fp%3E%3Cp%3E%3Cstrong%3ECaroline%20Louise%20Miller%3C%2Fstrong%3E%20%28they%2Fthem%29%20is%20a%20US%20composer%20based%20in%20Portland%2C%20Oregon.%20Common%20themes%20in%20their%20work%20include%20affect%2C%20ecology%2C%20labor%20politics%2C%20tactility%2C%20and%20the%20materiality%20of%20media%2C%20often%20within%20dreamlike%20musical%20spaces%20that%20thread%20field%20recordings%2C%20shimmering%20textures%2C%20and%20romantic%20melodic%20lines%20through%20harsh%20noise%20and%20clattering%20dissonances.%20They%20have%20enjoyed%20wide-ranging%20collaborations%2C%20and%20have%20been%20supported%20by%20numerous%20grants%2C%20fellowships%2C%20and%20commissions.%20These%20have%20most%20recently%20included%20funding%20through%20Seattle%20Modern%20Orchestra%2C%20Portland%20Jazz%20Composers%20Ensemble%2C%20Sonic%20Matter%20Festival%2C%20Alarm%20Will%20Sound%2FMatt%20Marks%20Impact%20Fund%2C%20SPLICE%20Ensemble%2C%20Chamber%20Music%20America%2C%20Guerilla%20Opera%2C%20Transient%20Canvas%2C%20Ensemble%20Adapter%2C%20and%20others.%20Their%20music%20is%20performed%20nationally%20and%20internationally.%3Cbr%3E%E2%80%8B%3Cbr%3EMiller%20has%20collaborated%20with%20writers%2C%20artists%2C%20filmmakers%2C%20oceanographers%2C%20limnologists%2C%20and%20others.%20In%202014%2C%20Miller%20worked%20as%20an%20artist-in-residence%20aboard%20a%20Scripps%20Institution%20of%20Oceanography%20research%20vessel%20in%20the%20Philippine%20Sea%2C%20sailing%20from%20Kaohsiung%2C%20Taiwan%20to%20Koror%2C%20Palau.%20Field%20recordings%20from%20the%20ship%20were%20used%20to%20compose%20the%20score%20for%20a%20feature-length%20experimental%20documentary%20by%20Lyndsay%20Bloom%20about%20daily%20life%20aboard%20the%20ship.%20Their%20multimedia%20installation%20Here%20There%3A%20%28Re%29collecting%20Labor%20on%20the%20American%20Railway%2C%20co-created%20with%20artist%20Stefani%20Byrd%20and%20featuring%20a%20score%20recorded%20with%20Alarm%20Will%20Sound%2C%20incorporates%20field%20recordings%20and%20video%20footage%20taken%20on%20an%20expedition%20to%20endangered%20historic%20sites%20in%20Northern%20California%2C%20and%20has%20been%20exhibited%20internationally.%20%26nbsp%3BFrom%202012-2017%2C%20Miller%20organized%20and%20curated%20an%20annual%20experimental%20music%20and%20cross-disciplinary%20collaborative%20showcase%20at%20the%20Birch%20Aquarium%20in%20La%20Jolla.%20At%20Portland%20State%2C%20Miller%20co-organizes%20ReWire%20Festival%2C%20an%20annual%20spring%20showcase%20of%20work%20involving%20collaborations%20between%20SAMP%20and%20Theater.%3C%2Fp%3E%3Cp%3EMiller%20is%20currently%20Assistant%20Professor%20of%20Sonic%20Arts%20at%20Portland%20State%20University%2C%20where%20they%20teach%20courses%20including%20electronic%20music%20composition%2C%20songwriting%2C%20studio%20production%2C%20and%20music%20for%20visual%20media.%20Their%20songwriting%20class%20is%20designed%20as%20an%20inclusive%2C%20student-led%20workshop%20culminating%20in%20an%20annual%20multi-genre%20showcase%20of%20songs.%20They%20a%20hold%20a%20Ph.D%20in%20Music%20from%20UC%20San%20Diego%2C%20and%20a%20Bachelor%20of%20Music%20from%20UMKC%20Conservatory%20of%20Music%20and%20Dance.%20In%20their%20spare%20time%2C%20they%20enjoy%20field%20recording%20and%20learning%20about%20zoology.%3C%2Fp%3E%3Cp%3E%26nbsp%3B%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3EChristine%20Freije%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3EStage%20Director%3C%2Fp%3E%3Cp%3E%3Cstrong%3EChristine%20Freije%3C%2Fstrong%3E%20%28she%2Fher%29%20is%20a%20theatre%20director%2C%20deviser%2C%20and%20educator.%20Her%20process%20is%20rooted%20in%20deep%20collaboration%20and%20play%20through%20an%20imaginative%20and%20expansive%20feminist%20lens%2C%20and%20her%20work%20wrestles%20with%20themes%20of%20gender%2C%20identity%2C%20and%20the%20kinetic%20body.%20Christine%E2%80%99s%20original%20devised%20work%20includes%20I%E2%80%99d%20Like%20to%20Think%20I%E2%80%99m%20Pretty%20Unique%3A%20a%20doppelg%C3%A4nger%20play%20and%20Shrew%2C%20which%20was%20recognized%20for%20Excellence%20in%20Devised%20Work%20by%20Bonaly%20Reviews.%20Other%20recent%20directing%20credits%20include%20Richard%20III%20%28Portland%20Playhouse%E2%80%99s%20Fall%20Festival%20of%20Shakespeare%29%2C%20Tartuffe%2C%20The%20Wolves%20%28Portland%20State%20University%29%2C%20Antigone%20%28Redtwist%20Theatre%29%2C%20Vinegar%20Tom%20and%20Everybody%20%28The%20Theatre%20School%20at%20DePaul%20University%29.%20She%20has%20worked%20around%20the%20country%20at%20Arden%20Theatre%2C%20St.%20Louis%20Shakespeare%20Festival%2C%20Redtwist%20Theatre%2C%20Philadelphia%20Artists%20Collective%2C%20Theatre%20Horizon%2C%20and%20others.%20She%E2%80%99s%20an%20adjunct%20professor%20at%20Portland%20State%20University%2C%20and%20she%20earned%20her%20MFA%20in%20Directing%20at%20The%20Theatre%20School%20at%20DePaul%20University.%20%3Ca%20href%3D%22https%3A%2F%2Fwww.christinefreije.com%22%3Ewww.christinefreije.com%3C%2Fa%3E%3C%2Fp%3E%3Cp%3E%26nbsp%3B%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3EStephen%20Lewis%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3EMusic%20Director%3C%2Fp%3E%3Cp%3E%3Cstrong%3 %20supported%20by%20numerous%20grants%2C%20fellowships%2C%20and%20commissions.%20These%20have%20most%20recently%20included%20funding%20through%20Seattle%20Modern%20Orchestra%2C%20Portland%20Jazz%20Composers%20Ensemble%2C%20Sonic%20Matter%20Festival%2C%20Alarm%20Will%20Sound%2FMatt%20Marks%20Impact%20Fund%2C%20SPLICE%20Ensemble%2C%20Chamber%20Music%20America%2C%20Guerilla%20Opera%2C%20Transient%20Canvas%2C%20Ensemble%20Adapter%2C%20and%20others.%20Their%20music%20is%20performed%20nationally%20and%20internationally.%3Cbr%3E%E2%80%8B%3Cbr%3EMiller%20has%20collaborated%20with%20writers%2C%20artists%2C%20filmmakers%2C%20oceanographers%2C%20limnologists%2C%20and%20others.%20In%202014%2C%20Miller%20worked%20as%20an%20artist-in-residence%20aboard%20a%20Scripps%20Institution%20of%20Oceanography%20research%20vessel%20in%20the%20Philippine%20Sea%2C%20sailing%20from%20Kaohsiung%2C%20Taiwan%20to%20Koror%2C%20Palau.%20Field%20recordings%20from%20the%20ship%20were%20used%20to%20compose%20the%20score%20for%20a%20feature-length%20experimental%20documentary%20by%20Lyndsay%20Bloom%20about%20daily%20life%20aboard%20the%20ship.%20Their%20multimedia%20installation%20Here%20There%3A%20%28Re%29collecting%20Labor%20on%20the%20American%20Railway%2C%20co-created%20with%20artist%20Stefani%20Byrd%20and%20featuring%20a%20score%20recorded%20with%20Alarm%20Will%20Sound%2C%20incorporates%20field%20recordings%20and%20video%20footage%20taken%20on%20an%20expedition%20to%20endangered%20historic%20sites%20in%20Northern%20California%2C%20and%20has%20been%20exhibited%20internationally.%20%26nbsp%3BFrom%202012-2017%2C%20Miller%20organized%20and%20curated%20an%20annual%20experimental%20music%20and%20cross-disciplinary%20collaborative%20showcase%20at%20the%20Birch%20Aquarium%20in%20La%20Jolla.%20At%20Portland%20State%2C%20Miller%20co-organizes%20ReWire%20Festival%2C%20an%20annual%20spring%20showcase%20of%20work%20involving%20collaborations%20between%20SAMP%20and%20Theater.%3C%2Fp%3E%3Cp%3EMiller%20is%20currently%20Assistant%20Professor%20of%20Sonic%20Arts%20at%20Portland%20State%20University%2C%20where%20they%20teach%20courses%20including%20electronic%20music%20composition%2C%20songwriting%2C%20studio%20production%2C%20and%20music%20for%20visual%20media.%20Their%20songwriting%20class%20is%20designed%20as%20an%20inclusive%2C%20student-led%20workshop%20culminating%20in%20an%20annual%20multi-genre%20showcase%20of%20songs.%20They%20a%20hold%20a%20Ph.D%20in%20Music%20from%20UC%20San%20Diego%2C%20and%20a%20Bachelor%20of%20Music%20from%20UMKC%20Conservatory%20of%20Music%20and%20Dance.%20In%20their%20spare%20time%2C%20they%20enjoy%20field%20recording%20and%20learning%20about%20zoology.%3C%2Fp%3E%3Cp%3E%26nbsp%3B%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3EChristine%20Freije%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3EStage%20Director%3C%2Fp%3E%3Cp%3E%3Cstrong%3EChristine%20Freije%3C%2Fstrong%3E%20%28she%2Fher%29%20is%20a%20theatre%20director%2C%20deviser%2C%20and%20educator.%20Her%20process%20is%20rooted%20in%20deep%20collaboration%20and%20play%20through%20an%20imaginative%20and%20expansive%20feminist%20lens%2C%20and%20her%20work%20wrestles%20with%20themes%20of%20gender%2C%20identity%2C%20and%20the%20kinetic%20body.%20Christine%E2%80%99s%20original%20devised%20work%20includes%20I%E2%80%99d%20Like%20to%20Think%20I%E2%80%99m%20Pretty%20Unique%3A%20a%20doppelg%C3%A4nger%20play%20and%20Shrew%2C%20which%20was%20recognized%20for%20Excellence%20in%20Devised%20Work%20by%20Bonaly%20Reviews.%20Other%20recent%20directing%20credits%20include%20Richard%20III%20%28Portland%20Playhouse%E2%80%99s%20Fall%20Festival%20of%20Shakespeare%29%2C%20Tartuffe%2C%20The%20Wolves%20%28Portland%20State%20University%29%2C%20Antigone%20%28Redtwist%20Theatre%29%2C%20Vinegar%20Tom%20and%20Everybody%20%28The%20Theatre%20School%20at%20DePaul%20University%29.%20She%20has%20worked%20around%20the%20country%20at%20Arden%20Theatre%2C%20St.%20Louis%20Shakespeare%20Festival%2C%20Redtwist%20 3E%3Cp%3ESunday%2C%20June%2021st%20performance%20includes%20ASL%20interpretation.%3C%2Fp%3E%3Cp%3EMultiple%20performances%20from%20June%2018-21%2C%202026.%3C%2Fp%3E%3Chr%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3ECaroline%20Louise%20Miller%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%E2%80%8BComposer%20%26amp%3B%20Librettist%3C%2Fp%3E%3Cp%3E%3Cstrong%3ECaroline%20Louise%20Miller%3C%2Fstrong%3E%20%28they%2Fthem%29%20is%20a%20US%20composer%20based%20in%20Portland%2C%20Oregon.%20Common%20themes%20in%20their%20work%20include%20affect%2C%20ecology%2C%20labor%20politics%2C%20tactility%2C%20and%20the%20materiality%20of%20media%2C%20often%20within%20dreamlike%20musical%20spaces%20that%20thread%20field%20recordings%2C%20shimmering%20textures%2C%20and%20romantic%20melodic%20lines%20through%20harsh%20noise%20and%20clattering%20dissonances.%20They%20have%20enjoyed%20wide-ranging%20collaborations%2C%20and%20have%20been%20supported%20by%20numerous%20grants%2C%20fellowships%2C%20and%20commissions.%20These%20have%20most%20recently%20included%20funding%20through%20Seattle%20Modern%20Orchestra%2C%20Portland%20Jazz%20Composers%20Ensemble%2C%20Sonic%20Matter%20Festival%2C%20Alarm%20Will%20Sound%2FMatt%20Marks%20Impact%20Fund%2C%20SPLICE%20Ensemble%2C%20Chamber%20Music%20America%2C%20Guerilla%20Opera%2C%20Transient%20Canvas%2C%20Ensemble%20Adapter%2C%20and%20others.%20Their%20music%20is%20performed%20nationally%20and%20internationally.%3Cbr%3E%E2%80%8B%3Cbr%3EMiller%20has%20collaborated%20with%20writers%2C%20artists%2C%20filmmakers%2C%20oceanographers%2C%20limnologists%2C%20and%20others.%20In%202014%2C%20Miller%20worked%20as%20an%20artist-in-residence%20aboard%20a%20Scripps%20Institution%20of%20Oceanography%20research%20vessel%20in%20the%20Philippine%20Sea%2C%20sailing%20from%20Kaohsiung%2C%20Taiwan%20to%20Koror%2C%20Palau.%20Field%20recordings%20from%20the%20ship%20were%20used%20to%20compose%20the%20score%20for%20a%20feature-length%20experimental%20documentary%20by%20Lyndsay%20Bloom%20about%20daily%20life%20aboard%20the%20ship.%20Their%20multimedia%20installation%20Here%20There%3A%20%28Re%29collecting%20Labor%20on%20the%20American%20Railway%2C%20co-created%20with%20artist%20Stefani%20Byrd%20and%20featuring%20a%20score%20recorded%20with%20Alarm%20Will%20Sound%2C%20incorporates%20field%20recordings%20and%20video%20footage%20taken%20on%20an%20expedition%20to%20endangered%20historic%20sites%20in%20Northern%20California%2C%20and%20has%20been%20exhibited%20internationally.%20%26nbsp%3BFrom%202012-2017%2C%20Miller%20organized%20and%20curated%20an%20annual%20experimental%20music%20and%20cross-disciplinary%20collaborative%20showcase%20at%20the%20Birch%20Aquarium%20in%20La%20Jolla.%20At%20Portland%20State%2C%20Miller%20co-organizes%20ReWire%20Festival%2C%20an%20annual%20spring%20showcase%20of%20work%20involving%20collaborations%20between%20SAMP%20and%20Theater.%3C%2Fp%3E%3Cp%3EMiller%20is%20currently%20Assistant%20Professor%20of%20Sonic%20Arts%20at%20Portland%20State%20University%2C%20where%20they%20teach%20courses%20including%20electronic%20music%20composition%2C%20songwriting%2C%20studio%20production%2C%20and%20music%20for%20visual%20media.%20Their%20songwriting%20class%20is%20designed%20as%20an%20inclusive%2C%20student-led%20workshop%20culminating%20in%20an%20annual%20multi-genre%20showcase%20of%20songs.%20They%20a%20hold%20a%20Ph.D%20in%20Music%20from%20UC%20San%20Diego%2C%20and%20a%20Bachelor%20of%20Music%20from%20UMKC%20Conservatory%20of%20Music%20and%20Dance.%20In%20their%20spare%20time%2C%20they%20enjoy%20field%20recording%20and%20learning%20about%20zoology.%3C%2Fp%3E%3Cp%3E%26nbsp%3B%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3EChristine%20Freije%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3EStage%20Director%3C%2Fp%3E%3Cp%3E%3Cstrong%3EChristine%20Freije%3C%2Fstrong%3E%20%28she%2Fher%29%20is%20a%20theatre%20director%2C%20deviser%2C%20and%20educator.%20Her%20process%20is%20rooted%20in%20deep%20collab thers.%20Their%20music%20is%20performed%20nationally%20and%20internationally.%3Cbr%3E%E2%80%8B%3Cbr%3EMiller%20has%20collaborated%20with%20writers%2C%20artists%2C%20filmmakers%2C%20oceanographers%2C%20limnologists%2C%20and%20others.%20In%202014%2C%20Miller%20worked%20as%20an%20artist-in-residence%20aboard%20a%20Scripps%20Institution%20of%20Oceanography%20research%20vessel%20in%20the%20Philippine%20Sea%2C%20sailing%20from%20Kaohsiung%2C%20Taiwan%20to%20Koror%2C%20Palau.%20Field%20recordings%20from%20the%20ship%20were%20used%20to%20compose%20the%20score%20for%20a%20feature-length%20experimental%20documentary%20by%20Lyndsay%20Bloom%20about%20daily%20life%20aboard%20the%20ship.%20Their%20multimedia%20installation%20Here%20There%3A%20%28Re%29collecting%20Labor%20on%20the%20American%20Railway%2C%20co-created%20with%20artist%20Stefani%20Byrd%20and%20featuring%20a%20score%20recorded%20with%20Alarm%20Will%20Sound%2C%20incorporates%20field%20recordings%20and%20video%20footage%20taken%20on%20an%20expedition%20to%20endangered%20historic%20sites%20in%20Northern%20California%2C%20and%20has%20been%20exhibited%20internationally.%20%26nbsp%3BFrom%202012-2017%2C%20Miller%20organized%20and%20curated%20an%20annual%20experimental%20music%20and%20cross-disciplinary%20collaborative%20showcase%20at%20the%20Birch%20Aquarium%20in%20La%20Jolla.%20At%20Portland%20State%2C%20Miller%20co-organizes%20ReWire%20Festival%2C%20an%20annual%20spring%20showcase%20of%20work%20involving%20collaborations%20between%20SAMP%20and%20Theater.%3C%2Fp%3E%3Cp%3EMiller%20is%20currently%20Assistant%20Professor%20of%20Sonic%20Arts%20at%20Portland%20State%20University%2C%20where%20they%20teach%20courses%20including%20electronic%20music%20composition%2C%20songwriting%2C%20studio%20production%2C%20and%20music%20for%20visual%20media.%20Their%20songwriting%20class%20is%20designed%20as%20an%20inclusive%2C%20student-led%20workshop%20culminating%20in%20an%20annual%20multi-genre%20showcase%20of%20songs.%20They%20a%20hold%20a%20Ph.D%20in%20Music%20from%20UC%20San%20Diego%2C%20and%20a%20Bachelor%20of%20Music%20from%20UMKC%20Conservatory%20of%20Music%20and%20Dance.%20In%20their%20spare%20time%2C%20they%20enjoy%20field%20recording%20and%20learning%20about%20zoology.%3C%2Fp%3E%3Cp%3E%26nbsp%3B%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3EChristine%20Freije%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3EStage%20Director%3C%2Fp%3E%3Cp%3E%3Cstrong%3EChristine%20Freije%3C%2Fstrong%3E%20%28she%2Fher%29%20is%20a%20theatre%20director%2C%20deviser%2C%20and%20educator.%20Her%20process%20is%20rooted%20in%20deep%20collaboration%20and%20play%20through%20an%20imaginative%20and%20expansive%20feminist%20lens%2C%20and%20her%20work%20wrestles%20with%20themes%20of%20gender%2C%20identity%2C%20and%20the%20kinetic%20body.%20Christine%E2%80%99s%20original%20devised%20work%20includes%20I%E2%80%99d%20Like%20to%20Think%20I%E2%80%99m%20Pretty%20Unique%3A%20a%20doppelg%C3%A4nger%20play%20and%20Shrew%2C%20which%20was%20recognized%20for%20Excellence%20in%20Devised%20Work%20by%20Bonaly%20Reviews.%20Other%20recent%20directing%20credits%20include%20Richard%20III%20%28Portland%20Playhouse%E2%80%99s%20Fall%20Festival%20of%20Shakespeare%29%2C%20Tartuffe%2C%20The%20Wolves%20%28Portland%20State%20University%29%2C%20Antigone%20%28Redtwist%20Theatre%29%2C%20Vinegar%20Tom%20and%20Everybody%20%28The%20Theatre%20School%20at%20DePaul%20University%29.%20She%20has%20worked%20around%20the%20country%20at%20Arden%20Theatre%2C%20St.%20Louis%20Shakespeare%20Festival%2C%20Redtwist%20Theatre%2C%20Philadelphia%20Artists%20Collective%2C%20Theatre%20Horizon%2C%20and%20others.%20She%E2%80%99s%20an%20adjunct%20professor%20at%20Portland%20State%20University%2C%20and%20she%20earned%20her%20MFA%20in%20Directing%20at%20The%20Theatre%20School%20at%20DePaul%20University.%20%3Ca%20href%3D%22https%3A%2F%2Fwww.christinefreije.com%22%3Ewww.christinefreije.com%3C%2Fa%3E%3C%2Fp%3E%3Cp%3E%26nbsp%3B%3C%2Fp%3E%3Cp%20class%3D%22text-align ach%20courses%20including%20electronic%20music%20composition%2C%20songwriting%2C%20studio%20production%2C%20and%20music%20for%20visual%20media.%20Their%20songwriting%20class%20is%20designed%20as%20an%20inclusive%2C%20student-led%20workshop%20culminating%20in%20an%20annual%20multi-genre%20showcase%20of%20songs.%20They%20a%20hold%20a%20Ph.D%20in%20Music%20from%20UC%20San%20Diego%2C%20and%20a%20Bachelor%20of%20Music%20from%20UMKC%20Conservatory%20of%20Music%20and%20Dance.%20In%20their%20spare%20time%2C%20they%20enjoy%20field%20recording%20and%20learning%20about%20zoology.%3C%2Fp%3E%3Cp%3E%26nbsp%3B%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3EChristine%20Freije%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3EStage%20Director%3C%2Fp%3E%3Cp%3E%3Cstrong%3EChristine%20Freije%3C%2Fstrong%3E%20%28she%2Fher%29%20is%20a%20theatre%20director%2C%20deviser%2C%20and%20educator.%20Her%20process%20is%20rooted%20in%20deep%20collaboration%20and%20play%20through%20an%20imaginative%20and%20expansive%20feminist%20lens%2C%20and%20her%20work%20wrestles%20with%20themes%20of%20gender%2C%20identity%2C%20and%20the%20kinetic%20body.%20Christine%E2%80%99s%20original%20devised%20work%20includes%20I%E2%80%99d%20Like%20to%20Think%20I%E2%80%99m%20Pretty%20Unique%3A%20a%20doppelg%C3%A4nger%20play%20and%20Shrew%2C%20which%20was%20recognized%20for%20Excellence%20in%20Devised%20Work%20by%20Bonaly%20Reviews.%20Other%20recent%20directing%20credits%20include%20Richard%20III%20%28Portland%20Playhouse%E2%80%99s%20Fall%20Festival%20of%20Shakespeare%29%2C%20Tartuffe%2C%20The%20Wolves%20%28Portland%20State%20University%29%2C%20Antigone%20%28Redtwist%20Theatre%29%2C%20Vinegar%20Tom%20and%20Everybody%20%28The%20Theatre%20School%20at%20DePaul%20University%29.%20She%20has%20worked%20around%20the%20country%20at%20Arden%20Theatre%2C%20St.%20Louis%20Shakespeare%20Festival%2C%20Redtwist%20Theatre%2C%20Philadelphia%20Artists%20Collective%2C%20Theatre%20Horizon%2C%20and%20others.%20She%E2%80%99s%2 l%20Arts%20and%20Culture%20Council%20%28RACC%29%2C%20Portland%20Arts%20and%20Culture%2C%20and%20Portland%20Arts%20Access%20Fund.%3C%2Fem%3E%3C%2Fp%3E%3Cp%3E%3Cstrong%3ECAST%3C%2Fstrong%3E%3Cbr%3E%3Cbr%3EVal%3A%20Lindsey%20Rae%20Johnson%3Cbr%3EBluejay%3A%20Phoebe%20Gildea%3Cbr%3ETraveler%201%3A%20Gina%20Adorno%3Cbr%3ETraveler%202%3A%20Allison%20Kim-Yok%20Knotts%3Cbr%3E%E2%80%8BStephen%20Lewis%2C%20music%20director%20%26amp%3B%20pianist%3C%2Fp%3E%3Cp%3E%3Cstrong%3ECREATIVE%20TEAM%3C%2Fstrong%3E%3C%2Fp%3E%3Cp%3E%3Cbr%3ECaroline%20Louise%20Miller%2C%20composer%20%26amp%3B%20librettist%3Cbr%3EChristine%20Freije%2C%20stage%20director%3Cbr%3ESamantha%20Kemp%2C%20lighting%20designer%3Cbr%3EEli%20Cannon%2C%20sculpture%20artist%3Cbr%3ELisa%20Neher%2C%20production%20manager%3Cbr%3ELisa%20Neher%2C%20costume%20%26amp%3B%20prop%20designer%3C%2Fp%3E%3Cp%3E%3Cstrong%3ECREW%3C%2Fstrong%3E%3C%2Fp%3E%3Cp%3E%3Cbr%3EAlex%20Homer%2C%20assistant%20stage%20manger%20%26amp%3B%20lighting%20technician%3Cbr%3EZachariah%20Barbour%2C%20lighting%20technician%3Cbr%3ERebecca%20Ralston%2C%20a%2Fv%20playback%20operator%3C%2Fp%3E%3Cp%3E%3Cstrong%3EASL%20INTERPRETERS%3C%2Fstrong%3E%3C%2Fp%3E%3Cp%3E%3Cbr%3EJessy%20Severe%20%26amp%3B%20Chelsea%20Huber%3C%2Fp%3E%3Cp%3E%3Cstrong%3EACCESSIBILITY%3C%2Fstrong%3E%3Cbr%3EThe%20Boiler%20Room%20Theatre%20is%20located%20on%20the%20ground%20floor%20of%20Lincoln%20Hall%20and%20is%20ADA%20Accessible.%20Enter%20Lincoln%20Hall%20from%20SW%20Broadway.%3C%2Fp%3E%3Cp%3EPerformed%20in%20English%20with%20English%20Supertitles.%3C%2Fp%3E%3Cp%3ESunday%2C%20June%2021st%20performance%20includes%20ASL%20interpretation.%3C%2Fp%3E%3Cp%3EMultiple%20performances%20from%20June%2018-21%2C%202026.%3C%2Fp%3E%3Chr%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3ECaroline%20Louise%20Miller%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%E2%80%8BComposer%20%26amp%3B%20Librettist%3C%2Fp%3E%3Cp%3E%3Cstrong%3ECaroline%20Louise%20Miller%3C%2Fstrong%3E%20%28they%2Fthem%29%20is%20a%20US%20composer%20based%20in%20Portland%2C%20Oregon.%20Common%20themes%20in%20their%20work%20include%20affect%2C%20ecology%2C%20labor%20politics%2C%20tactility%2C%20and%20the%20materiality%20of%20media%2C%20often%20within%20dreamlike%20musical%20spaces%20that%20thread%20field%20recordings%2C%20shimmering%20textures%2C%20and%20romantic%20melodic%20lines%20through%20harsh%20noise%20and%20clattering%20dissonances.%20They%20have%20enjoyed%20wide-ranging%20collaborations%2C%20and%20have%20been%20supported%20by%20numerous%20grants%2C%20fellowships%2C%20and%20commissions.%20These%20have%20most%20recently%20included%20funding%20through%20Seattle%20Modern%20Orchestra%2C%20Portland%20Jazz%20Composers%20Ensemble%2C%20Sonic%20Matter%20Festival%2C%20Alarm%20Will%20Sound%2FMatt%20Marks%20Impact%20Fund%2C%20SPLICE%20Ensemble%2C%20Chamber%20Music%20America%2C%20Guerilla%20Opera%2C%20Transient%20Canvas%2C%20Ensemble%20Adapter%2C%20and%20others.%20Their%20music%20is%20performed%20nationally%20and%20internationally.%3Cbr%3E%E2%80%8B%3Cbr%3EMiller%20has%20collaborated%20with%20writers%2C%20artists%2C%20filmmakers%2C%20oceanographers%2C%20limnologists%2C%20and%20others.%20In%202014%2C%20Miller%20worked%20as%20an%20artist-in-residence%20aboard%20a%20Scripps%20Institution%20of%20Oceanography%20research%20vessel%20in%20the%20Philippine%20Sea%2C%20sailing%20from%20Kaohsiung%2C%20Taiwan%20to%20Koror%2C%20Palau.%20Field%20recordings%20from%20the%20ship%20were%20used%20to%20compose%20the%20score%20for%20a%20feature-length%20experimental%20documentary%20by%20Lyndsay%20Bloom%20about%20daily%20life%20aboard%20the%20ship.%20Their%20multimedia%20installation%20Here%20There%3A%20%28Re%29collecting%20Labor%20on%20the%20American%20Railway%2C%20co-created%20with%20artist%20Stefani%20Byrd%20and%20featuring%20a%20score%20recorded%20with%20Alarm%20Will%20Sound%2C%20incorporates%20field%20recordings%20and%20video%20footage%20taken%20on%20an%20expedition%20to%20endangered%20historic%20sites%20in%20Northern%20California%2C%20and%20has%20been%20exhibited%20internationally.%20%26nbsp%3BFrom%202012-2017%2C%20Miller%20organized%20and%20curated%20an%20annual%20experimental%20music%20and%20cross-disciplinary%20collaborative%20showcase%20at%20the%20Birch%20Aquarium%20in%20La%20Jolla.%20At%20Portland%20State%2C%20Miller%20co-organizes%20ReWire%20Festival%2C%20an%20annual%20spring%20showcase%20of%20work%20involving%20collaborations%20between%20SAMP%20and%20Theater.%3C%2Fp%3E%3Cp%3EMiller%20is%20currently%20Assistant%20Professor%20of%20Sonic%20Arts%20at%20Portland%20State%20University%2C%20where%20they%20teach%20courses%20including%20electronic%20music%20composition%2C%20songwriting%2C%20studio%20production%2C%20and%20music%20for%20visual%20media.%20Their%20songwriting%20class%20is%20designed%20as%20an%20inclusive%2C%20student-led%20workshop%20culminating%20in%20an%20annual%20multi-genre%20showcase%20of%20songs.%20They%20a%20hold%20a%20Ph.D%20in%20Music%20from%20UC%20San%20Diego%2C%20and%20a%20Bachelor%20of%20Music%20from%20UMKC%20Conservatory%20of%20Music%20and%20Dance.%20In%20their%20spare%20time%2C%20they%20enjoy%20field%20recording%20and%20learning%20about%20zoology.%3C%2Fp%3E%3Cp%3E%26nbsp%3B%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3EChristine%20Freije%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3EStage%20Director%3C%2Fp%3E%3Cp%3E%3Cstrong%3EChristine%20Freije%3C%2Fstrong%3E%20%28she%2Fher%29%20is%20a%20theatre%20director%2C%20deviser%2C%20and%20educator.%20Her%20process%20is%20rooted%20in%20deep%20collaboration%20and%20play%20through%20an%20imaginative%20and%20expansive%20feminist%20lens%2C%20and%20her%20work%20wrestles%20with%20themes%20of%20gender%2C%20identity%2C%20and%20the%20kinetic%20body.%20Christine%E2%80%99s%20original%20devised%20work%20includes%20I%E2%80%99d%20Like%20to%20Think%20I%E2%80%99m%20Pretty%20Unique%3A%20a%20doppelg%C3%A4nger%20play%20and%20Shrew%2C%20which%20was%20recognized%20for%20Excellence%20in%20Devised%20Work%20by%20Bonaly%20Reviews.%20Other%20recent%20directing%20credits%20include%20Richard%20III%20%28Portland%20Playhouse%E2%80%99s%20Fall%20Festival%20of%20Shakespeare%29%2C%20Tartuffe%2C%20The%20Wolves%20%28Portland%20State%20University%29%2C%20Antigone%20%28Redtwist%20Theatre%29%2C%20Vinegar%20Tom%20and%20Everybody%20%28The%20Theatre%20School%20at%20DePaul%20University%29.%20She%20has%20worked%20around%20the%20country%20at%20Arden%20Theatre%2C%20St.%20Louis%20Shakespeare%20Festival%2C%20Redtwist%20Theatre%2C%20Philadelphia%20Artists%20Collective%2C%20Theatre%20Horizon%2C%20and%20others.%20She%E2%80%99s%20an%20adjunct%20professor%20at%20Portland%20State%20University%2C%20and%20she%20earned%20her%20MFA%20in%20Directing%20at%20The%20Theatre%20School%20at%20DePaul%20University.%20%3Ca%20href%3D%22https%3A%2F%2Fwww.christinefreije.com%22%3Ewww.christinefreije.com%3C%2Fa%3E%3C%2Fp%3E%3Cp%3E%26nbsp%3B%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3EStephen%20Lewis%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3EMusic%20Director%3C%2Fp%3E%3Cp%3E%3Cstrong%3EDr.%20Stephen%20Lewis%3C%2Fstrong%3E%20is%20pianist%2C%20composer%2C%20conductor%2C%20and%20music%20teacher%20living%20in%20Portland%2C%20Oregon.%20Stephen%20performs%20traditional%20piano%20music%20with%20a%20composer%E2%80%99s%20urgent%2C%20expressive%20power%2C%20while%20bringing%20to%20avant-garde%20and%20experimental%20music%20a%20classical%20concert%20pianist%E2%80%99s%20devotion%20to%20beautiful%20sound.%3C%2Fp%3E%3Cp%3ESteph&e[0][location]=Lincoln%20Hall%20Boiler%20Room%20Studio%20%28LH%2055%29%0A1620%20SW%20Park%20Ave.%0APortland%2C%20OR%2097201%0A&e[0][organizer]=Caroline%20Louise%20Miller%0Acarom2%40pdx.edu%0A&e[0][organizer_email]=carom2%40pdx.edu&e[0][timezone]=America%2FLos_Angeles&e[0][privacy]=public", "source_page": "https://www.pdx.edu/", "first_seen": "2026-06-20", "last_seen": "2026-06-20", "status": "open"}, {"id": "2a437ef885f0cdfa", "title": "iCalendar", "school": "Portland State Univers %20floor%20of%20Lincoln%20Hall%20and%20is%20ADA%20Accessible.%20Enter%20Lincoln%20Hall%20from%20SW%20Broadway.%3C%2Fp%3E%3Cp%3EPerformed%20in%20English%20with%20English%20Supertitles.%3C%2Fp%3E%3Cp%3ESunday%2C%20June%2021st%20performance%20includes%20ASL%20interpretation.%3C%2Fp%3E%3Cp%3EMultiple%20performances%20from%20June%2018-21%2C%202026.%3C%2Fp%3E%3Chr%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3ECaroline%20Louise%20Miller%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%E2%80%8BComposer%20%26amp%3B%20Librettist%3C%2Fp%3E%3Cp%3E%3Cstrong%3ECaroline%20Louise%20Miller%3C%2Fstrong%3E%20%28they%2Fthem%29%20is%20a%20US%20composer%20based%20in%20Portland%2C%20Oregon.%20Common%20themes%20in%20their%20work%20include%20affect%2C%20ecology%2C%20labor%20politics%2C%20tactility%2C%20and%20the%20materiality%20of%20media%2C%20often%20within%20dreamlike%20musical%20spaces%20that%20thread%20field%20recordings%2C%20shimmering%20textures%2C%20and%20romantic%20melodic%20lines%20through%20harsh%20noise%20and%20clattering%20dissonances.%20They%20have%20enjoyed%20wide-ranging%20collaborations%2C%20and%20have%20been%20supported%20by%20numerous%20grants%2C%20fellowships%2C%20and%20commissions.%20These%20have%20most%20recently%20included%20funding%20through%20Seattle%20Modern%20Orchestra%2C%20Portland%20Jazz%20Composers%20Ensemble%2C%20Sonic%20Matter%20Festival%2C%20Alarm%20Will%20Sound%2FMatt%20Marks%20Impact%20Fund%2C%20SPLICE%20Ensemble%2C%20Chamber%20Music%20America%2C%20Guerilla%20Opera%2C%20Transient%20Canvas%2C%20Ensemble%20Adapter%2C%20and%20others.%20Their%20music%20is%20performed%20nationally%20and%20internationally.%3Cbr%3E%E2%80%8B%3Cbr%3EMiller%20has%20collaborated%20with%20writers%2C%20artists%2C%20filmmakers%2C%20oceanographers%2C%20limnologists%2C%20and%20others.%20In%202014%2C%20Miller%20worked%20as%20an%20artist-in-residence%20aboard%20a%20Scripps%20Institution%20of%20Oceanography%20research%20vessel%20in%20the%20Philippine%20Sea%2C%20sailing%20from%20Kaohsiung%2C%20Taiwan%20to%20Koror%2C%20Palau.%20Field%20recordings%20from%20the%20ship%20were%20used%20to%20compose%20the%20score%20for%20a%20feature-length%20experimental%20documentary%20by%20Lyndsay%20Bloom%20about%20daily%20life%20aboard%20the%20ship.%20Their%20multimedia%20installation%20Here%20There%3A%20%28Re%29collecting%20Labor%20on%20the%20American%20Railway%2C%20co-created%20with%20artist%20Stefani%20Byrd%20and%20featuring%20a%20score%20recorded%20with%20Alarm%20Will%20Sound%2C%20incorporates%20field%20recordings%20and%20video%20footage%20taken%20on%20an%20expedition%20to%20endangered%20historic%20sites%20in%20Northern%20California%2C%20and%20has%20been%20exhibited%20internationally.%20%26nbsp%3BFrom%202012-2017%2C%20Miller%20organized%20and%20curated%20an%20annual%20experimental%20music%20and%20cross-disciplinary%20collaborative%20showcase%20at%20the%20Birch%20Aquarium%20in%20La%20Jolla.%20At%20Portland%20State%2C%20Miller%20co-organizes%20ReWire%20Festival%2C%20an%20annual%20spring%20showcase%20of%20work%20involving%20collaborations%20between%20SAMP%20and%20Theater.%3C%2Fp%3E%3Cp%3EMiller%20is%20currently%20Assistant%20Professor%20of%20Sonic%20Arts%20at%20Portland%20State%20University%2C%20where%20they%20teach%20courses%20including%20electronic%20music%20composition%2C%20songwriting%2C%20studio%20production%2C%20and%20music%20for%20visual%20media.%20Their%20songwriting%20class%20is%20designed%20as%20an%20inclusive%2C%20student-led%20workshop%20culminating%20in%20an%20annual%20multi-genre%20showcase%20of%20songs.%20They%20a%20hold%20a%20Ph.D%20in%20Music%20from%20UC%20San%20Diego%2C%20and%20a%20Bachelor%20of%20Music%20from%20UMKC%20Conservatory%20of%20Music%20and%20Dance.%20In%20their%20spare%20time%2C%20they%20enjoy%20field%20recording%20and%20learning%20about%20zoology.%3C%2Fp%3E%3Cp%3E%26nbsp%3B%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3E%3Cu%3EChristine%20Freije%3C%2Fu%3E%3C%2Fp%3E%3Cp%20class%3D%22text-align-center%22%3EStage%20Director%3C% function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uniq(a){return [...new Set(a.filter(Boolean))].sort((x,y)=>String(x).localeCompare(String(y),undefined,{numeric:true}));}
function fill(id,vals){const el=document.getElementById(id); while(el.options.length>1) el.remove(1); vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o);});}
function showTab(t){tab=t;document.getElementById('jobsTab').classList.toggle('active',t==='jobs');document.getElementById('schoolsTab').classList.toggle('active',t==='schools');configure();render();}
function configure(){const d=tab==='jobs'?JOBS:SCHOOLS; fill('state',uniq(d.map(x=>x.state))); fill('rank',uniq(d.map(x=>x.usnews_cs_rank||x.school_rank))); fill('field',tab==='jobs'?uniq(JOBS.flatMap(x=>x.field||[])):[]); fill('status',tab==='jobs'?uniq(JOBS.map(x=>x.status||'open')):[]); document.getElementById('field').disabled=tab!=='jobs'; document.getElementById('status').disabled=tab!=='jobs';}
function match(x){const q=document.getElementById('q').value.toLowerCase().trim(), state=document.getElementById('state').value, rank=document.getElementById('rank').value, field=document.getElementById('field').value, status=document.getElementById('status').value; const hay=JSON.stringify(x).toLowerCase(); if(q&&!hay.includes(q))return false; if(state&&x.state!==state)return false; if(rank&&String(x.usnews_cs_rank||x.school_rank||'')!==rank)return false; if(tab==='jobs'&&field&&!(x.field||[]).includes(field))return false; if(tab==='jobs'&&status&&(x.status||'open')!==status)return false; return true;}
function render(){const thead=document.querySelector('#table thead'), tbody=document.querySelector('#table tbody'); tbody.innerHTML=''; if(tab==='jobs'){thead.innerHTML='<tr><th>Position</th><th>School</th><th>ID</th><th>Location</th><th>Field</th><th>Deadline</th><th>Status</th></tr>'; JOBS.filter(match).forEach(j=>{const fields=(j.field||[]).map(f=>`<span class="tag">${esc(f)}</span>`).join(' '); const title=j.source_url?`<a href="${esc(j.source_url)}" target="_blank" rel="noopener">${esc(j.title)}</a>`:esc(j.title); tbody.insertAdjacentHTML('beforeend',`<tr><td>${title}<br><span class="muted">${esc(j.track||'')}</span></td><td>${esc(j.school)}</td><td>${esc(j.school_rank||'')}</td><td>${esc(j.location||j.state||'')}</td><td>${fields}</td><td>${esc(j.deadline||'')}</td><td>${esc(j.status||'open')}</td></tr>`);});} else {thead.innerHTML='<tr><th>ID</th><th>School</th><th>Location</th><th>Official</th><th>CS Dept</th><th>CS Jobs</th><th>Faculty Jobs</th></tr>'; SCHOOLS.filter(match).forEach(s=>{const off=s.official_url?`<a href="${esc(s.official_url)}" target="_blank">official</a>`:''; const cs=s.cs_department_url?`<a href="${esc(s.cs_department_url)}" target="_blank">CS</a>`:''; const csjobs=s.cs_jobs_url?`<a href="${esc(s.cs_jobs_url)}" target="_blank">CS jobs</a>`:''; const faculty=s.faculty_jobs_url||s.careers_url; const fl=faculty?`<a href="${esc(faculty)}" target="_blank">faculty jobs</a>`:''; tbody.insertAdjacentHTML('beforeend',`<tr><td>${esc(s.usnews_cs_rank)}</td><td>${esc(s.school)}</td><td>${esc(s.location||s.state)}</td><td>${off}</td><td>${cs}</td><td>${csjobs}</td><td>${fl}</td></tr>`);});}}
